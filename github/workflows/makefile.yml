name: Build SwipeDown27

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install lz4 xz
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Setup Theos Environment
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.0.sdk.tar.xz -o ~/theos/sdks/iPhoneOS14.0.sdk.tar.xz
        tar -xf ~/theos/sdks/iPhoneOS14.0.sdk.tar.xz -C ~/theos/sdks/
        rm ~/theos/sdks/iPhoneOS14.0.sdk.tar.xz

    - name: Compile Tweak Package
      run: |
        make package FINALPACKAGE=1

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SwipeDown27-Package
        path: packages/*.deb
